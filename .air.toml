# Config file for [Air](https://github.com/air-verse/air) in toml format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old go build. Can be altered if you have multiple main.go files.
  cmd = "go build -o ./tmp/main main.go"
  # Binary file yields from `cmd`.
  bin = "./tmp/main"
  # Customize binary, can run with additional arguments.
  full_bin = "./tmp/main"
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "toml", "env"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "Schema"]
  # Watch these directories if you specified.
  include_dir = []
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  exclude_regex = ["_test.go"]
  # Exclude unchanged files.
  exclude_unchanged = true
  # Follow symlink for directories.
  follow_symlink = true
  # This log file places in your tmp_dir.
  log = "build-errors.log"
  # It's not necessary to trigger build each time file changes if it's too frequent.
  delay = 1000 # ms
  # Stop to run old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process (useful for cleanup).
  send_interrupt = true
  # Delay before sending Kill signal.
  kill_delay = 500 # ms

[color]
  # Customize each part's color. If no color found, use the raw log.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  # Show log time
  time = false
  # Only show main log (not watchers/build/runner etc.)
  main_only = false

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
